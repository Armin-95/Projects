<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Analysis for {{ symbol }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
  <h1>Analysis for {{ symbol }}</h1>
  <div id="chart" style="width:100%;max-width:900px;height:500px;margin:auto;"></div>

  <script>
  (function() {
    const dates   = {{ dates|tojson }};
    const closes  = {{ closes|tojson }};
    const vols    = {{ volumes|tojson }};
    const ma20    = {{ ma20|tojson }};
    const ma50    = {{ ma50|tojson }};

    const traceClose = { x: dates, y: closes, mode: 'lines', name: 'Close' };
    const traceMA20  = { x: dates, y: ma20, mode: 'lines', name: 'MA 20' };
    const traceMA50  = { x: dates, y: ma50, mode: 'lines', name: 'MA 50' };
    const traceVol   = {
      x: dates, y: vols, type: 'bar', name: 'Volume',
      yaxis: 'y2', opacity: 0.5,
    };

    const layout = {
      title: {
        text: `{{ symbol }} — Price & Volume`,
        font: {
          size: 30,                       //  bigger font
          family: 'Roboto, Arial, sans-serif',
          color: '#000000'                // matches your dark theme
        },
        xref: 'paper',
        x: 0.5,                           // center title horizontally
        xanchor: 'center'
      },
      xaxis: { rangeslider: { visible: false } },
      yaxis: { title: 'Price (USD)' },
      yaxis2: {
        title: 'Volume',
        overlaying: 'y',
        side: 'right',
        showgrid: false
      },
      legend: {
        orientation: 'h',                 // horizontal legend
        x: 0.5,                           // center horizontally
        y: 1,                          // 👈 push higher above chart
        xanchor: 'center',
        yanchor: 'bottom',
        bgcolor: 'rgba(0,0,0,0)',         // transparent
        bordercolor: 'rgba(0,0,0,0)'
      },
      //margin: { t: 100 }                  // extra top margin so title + legend fit
    };
  

    Plotly.newPlot('chart', [traceClose, traceMA20, traceMA50, traceVol], layout);
  })();
  </script>

  <div class="stats-analysis">
    <p><strong>1 year Mean Close:</strong> $ {{ mean_price }} </p>
    <p><strong>Month Mean Close:</strong> $ {{ mean_price_month }}</p>
    <p><strong>1 year Volatility (σ):</strong> {{ volatility }}%</p>
    <p><strong>Month Volatility (σ):</strong> {{ volatility_month }}%</p>
  </div>

  <p style="text-align:center; margin-top:40px;">
    <a href="{{ url_for('index') }}"style="color:rgb(119, 119, 146); text-decoration:none;">← Back to Main Page</a>
  </p>
</body>
</html>
